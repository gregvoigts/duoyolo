# MultiRail8-track dataset (first 8 images from MultiRail)
# Documentation: https://github.com/gregvoigts/duoyolo/tree/main/docs/datasets/MultiRail8-track
# Example usage: yolo train data=MultiRail8-track.yaml
# parent
# ├── duoYolo
# └── datasets
#     └── MultiRail8-track ← downloads here (1 MB)

# Train/val/test sets as 1) dir: path/to/imgs, 2) file: path/to/imgs.txt, or 3) list: [path/to/imgs1, path/to/imgs2, ..]
path: MultiRail8-track # dataset root dir
train: train.txt # train images (relative to 'path') 4 images
val: val.txt # val images (relative to 'path') 4 images
test: # test images (optional)

# Classes
names:
  0: track

# Download script/URL (optional)
download: https://github.com/gregvoigts/duoyolo/assets/releases/download/v0.0.0/MultiRail8-track.zip
